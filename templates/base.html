<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LEGO Inventář{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }

    body {
      background: #f0f4ff;
      min-height: 100vh;
    }

    /* Navbar */
    .navbar-lego {
      background: #FFD700;
      border-bottom: 4px solid #E3000B;
      padding: 0.6rem 1.5rem;
    }
    .navbar-lego .navbar-brand {
      font-size: 1.6rem;
      font-weight: 900;
      color: #E3000B !important;
      letter-spacing: -0.5px;
      text-shadow: 1px 1px 0 #000;
    }
    .navbar-lego .navbar-brand span {
      color: #006CB7;
    }
    .navbar-lego .nav-link {
      font-weight: 700;
      color: #1a1a1a !important;
      font-size: 1rem;
      padding: 0.4rem 1rem !important;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .navbar-lego .nav-link:hover,
    .navbar-lego .nav-link.active {
      background: rgba(0,0,0,0.12);
    }
    .navbar-lego .nav-link i {
      margin-right: 4px;
    }

    /* Tlačítka */
    .btn-lego-red {
      background: #E3000B; color: #fff; font-weight: 700;
      border: none; border-radius: 10px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-lego-red:hover { background: #b5000a; color: #fff; transform: translateY(-1px); }

    .btn-lego-blue {
      background: #006CB7; color: #fff; font-weight: 700;
      border: none; border-radius: 10px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-lego-blue:hover { background: #00538e; color: #fff; transform: translateY(-1px); }

    .btn-lego-yellow {
      background: #FFD700; color: #1a1a1a; font-weight: 700;
      border: 2px solid #e6c200; border-radius: 10px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-lego-yellow:hover { background: #e6c200; transform: translateY(-1px); }

    /* Karty */
    .card-lego {
      border: none;
      border-radius: 16px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: transform 0.15s, box-shadow 0.15s;
      overflow: hidden;
    }
    .card-lego:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    /* Stat karty */
    .stat-card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      border-top: 5px solid var(--lego-color, #FFD700);
    }
    .stat-card .stat-number {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--lego-color, #FFD700);
      line-height: 1;
    }
    .stat-card .stat-label {
      font-size: 0.9rem;
      color: #666;
      font-weight: 600;
      margin-top: 0.3rem;
    }

    /* Flashes */
    .alert { border-radius: 12px; font-weight: 600; }

    /* Stud pattern záhlaví */
    .page-header {
      background: #FFD700;
      border-radius: 16px;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      border-bottom: 4px solid #e6c200;
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      top: -10px; right: -10px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
    }
    .page-header h1 {
      font-weight: 900;
      color: #E3000B;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
      margin: 0;
    }

    /* Barva tečka */
    .color-dot {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.2);
      vertical-align: middle;
      margin-right: 6px;
    }

    /* Počet kontrola */
    .pocet-control {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pocet-control .pocet-badge {
      font-size: 1.1rem;
      font-weight: 800;
      min-width: 40px;
      text-align: center;
      background: #f0f4ff;
      padding: 2px 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-lego">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">
      <i class="bi bi-boxes"></i> LEGO <span>Inventář</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/">
            <i class="bi bi-house-fill"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.blueprint == 'dilky' %}active{% endif %}" href="/dilky/">
            <i class="bi bi-puzzle-fill"></i> Dílky
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.blueprint == 'sety' %}active{% endif %}" href="/sety/">
            <i class="bi bi-box-seam-fill"></i> Sety
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link btn-lego-red ms-2 px-3" href="/dilky/hledat">
            <i class="bi bi-plus-circle-fill"></i> Přidat
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'info' }} alert-dismissible fade show" role="alert">
          <i class="bi bi-{{ 'check-circle-fill' if category == 'success' else 'info-circle-fill' }}"></i>
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
